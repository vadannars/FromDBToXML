Listen 8080

DocumentRoot "/workspaces/FromDBToXML/public"
<Directory "/workspaces/FromDBToXML/public">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

DirectoryIndex loanstatus.php index.php index.html

# Proxy PHP requests to PHP-FPM socket
ProxyPassMatch "^/(.*\.php(/.*)?)$" "unix:/run/php/php8.1-fpm.sock|fcgi://localhost/workspaces/FromDBToXML/public"

ErrorLog /dev/stderr
CustomLog /dev/stdout combined
